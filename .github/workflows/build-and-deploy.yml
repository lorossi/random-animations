name: Build and Deploy on GitHub Pages
on:
  push:
    branches:
      - main
    paths:
      - "animations/**"
      - "scripts/**"
      - "homepage/**"
      - ".github/workflows/**"
  workflow_dispatch:

concurrency:
  group: pages-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pages: write
  id-token: write

env:
  SITE_ARTIFACTS_PATH: dest
  SITE_ARTIFACT_NAME: website-files

jobs:
  check-animations:
    runs-on: ubuntu-latest

    steps:
      - &checkout_step
        name: Checkout repository
        uses: actions/checkout@v5
      - &setup_python_step
        name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: ./scripts/requirements.txt
      - &install_dependencies_step
        name: Install dependencies
        run: pip install -r ./scripts/requirements.txt
      - name: Run animations check
        run: python3 ./scripts/check_animations.py

  build:
    runs-on: ubuntu-latest
    needs: check-animations
    steps:
      - *checkout_step
      - *setup_python_step
      - *install_dependencies_step

      - name: Build website
        run: python3 ./scripts/build_website.py --destination ${{ env.SITE_ARTIFACTS_PATH }} --randomize --seed 875492

      - name: Upload static files as artifact
        uses: actions/upload-artifact@v3
        with:
          name: ${{ env.SITE_ARTIFACT_NAME }}
          path: ${{ env.SITE_ARTIFACTS_PATH }}

  deploy:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - *checkout_step
      - *setup_python_step
      - *install_dependencies_step

      - name: Download artifact
        uses: actions/download-artifact@v8
        with:
          name: ${{ env.SITE_ARTIFACT_NAME }}
          path: ${{ env.SITE_ARTIFACTS_PATH }}

      - name: Deploy to website
        run: python3 scripts/publish_website.py --source ${{ env.SITE_ARTIFACTS_PATH }} --destination public_html/random-animations/ --host lorenzoros.si --user lorenz66